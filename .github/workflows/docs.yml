name: Documentation Build

on:
  workflow_call:
    inputs:
      retention-days:
        description: "Number of days to retain the artifact"
        required: false
        default: 1
        type: number
      workflow-version:
        description: "Version or branch to checkout"
        required: false
        default: "main"
        type: string
      bazel-target:
        description: "The Bazel target to build (e.g., //docs)"
        required: false
        type: string
        default: "//:docs"
      tests-report-artifact:
        description: "Name of the artifact that contains test reports"
        required: false
        default: ""
        type: string
      deployment_type:
        description: "Type of deployment: legacy or workflow"
        type: string
        required: false
        default: "workflow"
      gh_app_client_id:
        description: "GitHub App Client ID for inter-repo access (not used in public S-CORE)"
        required: false
        default: ""
        type: string
    secrets:
      gh_app_private_key:
        description: "GitHub App Private Key for inter-repo access (not used in public S-CORE)"
        required: false
      token:
        description: "GitHub Token for inter-repo access (not used in public S-CORE)"
        required: false

env:
  CACHE_KEY_PREFIX: bazel-cache

jobs:
  docs-build:
    name: Build Documentation
    runs-on: ${{ vars.runner_labels_ghub_standard_x64 && fromJSON(vars.runner_labels_ghub_standard_x64) || vars.REPO_RUNNER_LABELS && fromJSON(vars.REPO_RUNNER_LABELS) || 'ubuntu-latest' }}
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: eclipse-score/cicd-actions/inter-repo-access@94ffd2cc2840f31ebec202859266e49d35f0ffb1 # main branch as of 2026-04-23
        # Hint: if condition cannot access secrets, so we pass them via env
        env:
          HAS_GH_APP_PRIVATE_KEY: ${{ secrets.gh_app_private_key != '' }}
          HAS_TOKEN: ${{ secrets.token != '' }}
        if: ${{ env.HAS_GH_APP_PRIVATE_KEY == 'true' || env.HAS_TOKEN == 'true' }}
        with:
          token: ${{ secrets.token }}
          github-app-client-id: ${{ inputs.gh_app_client_id }}
          github-app-private-key: ${{ secrets.gh_app_private_key }}

      - uses: eclipse-score/more-disk-space@3fac5780033e636b114cf69e891dc19d640855c2 # v1.1
        with:
          level: 3

      - name: Checkout repository (Handle all events)
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.head_ref || github.event.pull_request.head.ref || github.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          # Reuse the token from inter-repo-access action to ensure access to private repos
          persist-credentials: false

      - name: Checkout action
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # current repo name
          repository: eclipse-score/cicd-workflows
          ref: ${{ inputs.workflow-version }}
          path: ./cicd-workflows
          # Reuse the token from inter-repo-access action to ensure access to private repos
          persist-credentials: false

      - name: Setup Bazel
        uses: eclipse-score/cicd-actions/setup-bazel-cache@44248a21e169b7513b78c12d7b1a800323bb7b75
        with:
          unique-cache-name: ${{ github.job }}

      - name: Install Graphviz
        uses: eclipse-score/apt-install@bd30e2e74a4850389719cb8c3e312bb26aada4e0 # v1.0.0
        with:
          packages: graphviz
          cache: false

      - name: Download test report
        if: ${{ inputs.tests-report-artifact != '' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ inputs.tests-report-artifact }}
          path: tests-report

      - name: List downloaded test report contents
        if: ${{ inputs.tests-report-artifact != '' }}
        run: |
          echo "Contents of downloaded test report artifact:"
          find tests-report -type f -exec ls -la {} \;
          echo ""
          echo "Directory structure:"
          find tests-report -type d | sort

      - name: Build documentation
        run: |
          bazel run ${{ inputs.bazel-target }}

          tar -cf github-pages.tar _build

      - name: Upload documentation artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: github-pages-${{ github.event.pull_request.head.sha || github.sha }}
          path: github-pages.tar
          retention-days: ${{ inputs.retention-days }}
          if-no-files-found: error

  docs-deploy:
    name: Deploy Documentation to GitHub Pages
    runs-on: ${{ vars.runner_labels_ghub_standard_x64 && fromJSON(vars.runner_labels_ghub_standard_x64) || vars.REPO_RUNNER_LABELS && fromJSON(vars.REPO_RUNNER_LABELS) || 'ubuntu-latest' }}
    needs: docs-build
    concurrency:
      group: pages-deploy-${{ github.repository }}
      cancel-in-progress: false
      queue: max
    permissions:
      pages: write
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - name: Ensure gh-pages branch exists with initial files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          if ! git ls-remote --exit-code --heads "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" gh-pages; then
            echo "gh-pages branch does not exist. Creating it..."
            git clone --depth=1 "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" repo
            cd repo
            git fetch origin main --depth=1
            AUTHOR_NAME=$(git log origin/main -1 --pretty=format:'%an')
            AUTHOR_EMAIL=$(git log origin/main -1 --pretty=format:'%ae')
            git config user.name "$AUTHOR_NAME"
            git config user.email "$AUTHOR_EMAIL"
            echo "Using commit identity: $AUTHOR_NAME <$AUTHOR_EMAIL>"

            git checkout --orphan gh-pages
            git rm -rf . || true
            REPO_NAME=$(basename "${REPO}")
            OWNER_NAME="${REPO%%/*}"

            touch versions.json
            echo "[" > versions.json
            echo "  {" >> versions.json
            echo "    \"version\": \"main\"," >> versions.json
            echo "    \"url\": \"https://${OWNER_NAME}.github.io/${REPO_NAME}/main/\"" >> versions.json
            echo "  }" >> versions.json
            echo "]" >> versions.json

            touch index.html
            echo '<!DOCTYPE html>' > index.html
            echo '<html lang="en">' >> index.html
            echo '<head>' >> index.html
            echo '    <meta charset="UTF-8">' >> index.html
            echo '    <meta http-equiv="refresh" content="0; URL=main/">' >> index.html
            echo '    <title>Redirecting...</title>' >> index.html
            echo '</head>' >> index.html
            echo '<body>' >> index.html
            echo '    <p>If you are not redirected, <a href="main/">click here</a>.</p>' >> index.html
            echo '</body>' >> index.html
            echo '</html>' >> index.html

            touch .nojekyll
            git add versions.json index.html .nojekyll
            git commit -m "Initialize gh-pages branch with versions.json and index.html"
            git push origin gh-pages
            cd ..
            rm -rf repo
          else
            echo "gh-pages branch exists. Skipping creation."
          fi
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Download documentation artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: github-pages-${{ github.event.pull_request.head.sha || github.sha }}

      - name: Untar documentation artifact
        run: mkdir -p extracted_docs && tar -xf github-pages.tar -C extracted_docs

      - name: Deploy 🚀
        id: pages-deployment
        uses: eclipse-score/cicd-workflows/.github/actions/deploy-versioned-pages@main
        with:
          source_folder: extracted_docs/_build
          deployment_type: ${{ inputs.deployment_type }}
