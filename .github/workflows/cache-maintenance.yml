name: Repository cache maintenance
# Check cache inputs and recreate repository cache only when required.
# Fetch dependencies for configured variants and upload a single repository cache.
# This workflow should be the only one which uploads a repository cache,
# because setup-bazel will not upload a new cache on cache hit when hash based keying is used.
#
# Cache strategies:
# - repository cache: refreshed when MODULE.bazel.lock changes.
#   In this case a new cache will be rebuilt from scratch and the old one deleted.
# - disk cache: Except when MODULE.bazel.lock changes, contents are only added.
#   It is wiped on MODULE.bazel.lock changes to avoid stale content and limit the size of the cache.
#
# Both caches are only updated when the workflow is triggered by a push to the main branch.
# In pull requests and merge_queue the caches are read-only.
#
# Concurrency:
# - Rebuilding caches should not be done in parallel.
# - Reading caches and dry-runs can be done in parallel.
#
# Usage:
#   This workflow shall be called on pushes to the main branch to rebuild caches if needed.
#   For dry-runs execute this workflow in pull requests or the merge queue.
#
# Example:
# ```
# name: Cache maintenance

# on:
#   pull_request:
#     types: [opened, reopened, synchronize, labeled, unlabeled]
#   merge_group:
#     types: [checks_requested]
#   workflow_dispatch:
#   push:
#     branches: [main]

# jobs:
#   repository_cache_maintenance:
#     permissions:
#       actions: write # needed for cache deletion after cache refresh
#       contents: read
#     secrets:
#       score-qnx-license: ${{ secrets.SCORE_QNX_LICENSE }}
#       score-qnx-user: ${{ secrets.SCORE_QNX_USER }}
#       score-qnx-password: ${{ secrets.SCORE_QNX_PASSWORD }}
#     uses: eclipse-score/cicd-workflows/.github/workflows/cache-maintenance.yml@<hash>
#     with:
#       variants: |
#         //...
#         --config=x86_64-linux //...
#
#   ci:
#     needs:
#       - repository_cache_maintenance
#     secrets: inherit
#     if: ${{ github.event_name == 'push' }}
#     uses: ./.github/workflows/ci.yml
#
#   delete_old_caches:
#     runs-on: ubuntu-24.04
#     needs:
#       - ci
#     permissions:
#       actions: write # needed for deletion of old caches
#       contents: read
#     if: ${{ !cancelled() && github.event_name == 'push' }}
#     steps:
#       - name: Prune obsolete Bazel caches
#         uses: eclipse-score/cicd-actions/prune-cache@<hash>
# ```

on:
  workflow_call:
    inputs:
      variants:
        description: |-
          Newline-separated list of arguments to append to `bazel fetch`.
          Each line is split on whitespace and passed as one fetch invocation.
          Examples: `--config=x86_64-linux //...`, `//...`, `//test //quality`.
        required: true
        type: string
    secrets:
      score-qnx-license:
        description: Base64-encoded QNX license content
        required: false
      score-qnx-user:
        description: QNX account username
        required: false
      score-qnx-password:
        description: QNX account password
        required: false

concurrency:
  # Serialize push and workflow_dispatch runs per branch; keep other events parallel.
  group: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && format('{0}-{1}', github.workflow, github.ref_name) || format('{0}-{1}', github.workflow, github.run_id) }}
  cancel-in-progress: false

jobs:
  repository_cache_maintenance:
    name: Create new repository cache if required
    runs-on: ubuntu-24.04
    outputs:
      should_refresh_cache: ${{ steps.check.outputs.any_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with: # configuration needed for tj-actions/changed-files
          fetch-depth: 2 # needed for push events
          persist-credentials: true

      - name: Check if Bazel repository cache inputs changed
        id: check
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: |
            MODULE.bazel.lock

      - uses: eclipse-score/more-disk-space@3fac5780033e636b114cf69e891dc19d640855c2 # v1.1
        if: ${{ steps.check.outputs.any_changed == 'true' && github.event_name == 'push' }}

      - name: Create Bazel output base directory
        if: ${{ steps.check.outputs.any_changed == 'true' || github.event_name != 'push' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo mkdir -p /mnt/.bazel
          sudo chown -R $USER:$USER /mnt/.bazel

      - name: Setup Bazel
        if: ${{ steps.check.outputs.any_changed == 'true' || github.event_name != 'push' }}
        uses: eclipse-score/cicd-actions/setup-bazel-cache@44248a21e169b7513b78c12d7b1a800323bb7b75
        with:
          unique-cache-name: ${{ github.job }}
          skip-cache-restore: true

      - uses: eclipse-score/cicd-actions/unblock-user-namespace-for-linux-sandbox@07cd8ac969b01fbab47f1a0b91040bcd83008fa7
        if: ${{ steps.check.outputs.any_changed == 'true' && github.event_name == 'push' }}

      - name: Check QNX secret availability
        id: qnx_secrets
        if: ${{ steps.check.outputs.any_changed == 'true' && github.event_name == 'push' }}
        shell: bash
        env:
          QNX_LICENSE: ${{ secrets.score-qnx-license }}
          QNX_USER: ${{ secrets.score-qnx-user }}
          QNX_PASSWORD: ${{ secrets.score-qnx-password }}
        run: |
          set -euo pipefail
          if [[ -n "${QNX_LICENSE}" && -n "${QNX_USER}" && -n "${QNX_PASSWORD}" ]]; then
            echo "has_all=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_all=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup QNX SDP usage
        if: ${{ steps.check.outputs.any_changed == 'true' && github.event_name == 'push' && steps.qnx_secrets.outputs.has_all == 'true' }}
        uses: eclipse-score/cicd-actions/setup-qnx-sdp@07cd8ac969b01fbab47f1a0b91040bcd83008fa7
        with:
          qnx-license: ${{ secrets.score-qnx-license }}
          qnx-user: ${{ secrets.score-qnx-user }}
          qnx-password: ${{ secrets.score-qnx-password }}
          qnx-license-dir: /opt/score_qnx/license

      - name: Validate variants and warm Bazel repository cache artifacts
        if: ${{ steps.check.outputs.any_changed == 'true' || github.event_name != 'push' }}
        uses: eclipse-score/cicd-actions/warm-bazel-repository-cache@44248a21e169b7513b78c12d7b1a800323bb7b75
        with:
          variants: ${{ inputs.variants }}
          dry-run: ${{ github.event_name != 'push' }}

  prune_old_caches:
    # Extra job for deletion of caches is needed to avoid time window with no repository cache available.
    # `setup-bazel-cache` uploads caches in its post step. With an extra job we can be sure that is finished.
    runs-on: ubuntu-24.04
    permissions:
      actions: write # needed for cache deletion
      contents: read
    needs: repository_cache_maintenance
    if: ${{ needs.repository_cache_maintenance.outputs.should_refresh_cache == 'true' && github.event_name == 'push' }}
    steps:
      - name: Delete all disk caches
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # setup-bazel creates disk cache names containing `-disk-` to distinguish them from other (bazelisk, repository) caches
          set -euo pipefail
          gh cache list --repo ${{ github.repository }} --limit 1000 --json id,key \
          | jq -r '.[] | select(.key | contains("-disk-")) | .id' \
          | xargs -r -n1 gh cache delete --repo ${{ github.repository }}
      - name: Prune repository cache
        uses: eclipse-score/cicd-actions/prune-cache@07cd8ac969b01fbab47f1a0b91040bcd83008fa7
