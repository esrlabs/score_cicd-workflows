name: Documentation Verification

on:
  workflow_call:
    inputs:
      bazel-docs-verify-target:
        description: "Bazel target for docs verification"
        required: false
        type: string
        default: "//:docs_check"
    outputs:
      verification-result:
        description: "Result of the docs verification"
        value: ${{ jobs.docs-verify.outputs.verification-result }}

env:
  CACHE_KEY_PREFIX: bazel-cache

jobs:
  docs-verify:
    name: Docs Verification
    runs-on: ${{ vars.runner_labels_ghub_standard_x64 && fromJSON(vars.runner_labels_ghub_standard_x64) || vars.REPO_RUNNER_LABELS && fromJSON(vars.REPO_RUNNER_LABELS) || 'ubuntu-latest' }}
    outputs:
      verification-result: ${{ steps.verify.outcome }}
    permissions:
      contents: read
    steps:
      - uses: eclipse-score/more-disk-space@6a3b48901846bf7f8cc985925157d71a8973e61f # v1
        with:
          level: 3

      - name: Checkout repository (Handle all events)
        uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.head_ref || github.event.pull_request.head.ref || github.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - name: Setup Bazel
        uses: eclipse-score/cicd-actions/setup-bazel-cache@07cd8ac969b01fbab47f1a0b91040bcd83008fa7
        with:
          unique-cache-name: ${{ github.job }}

      - name: Install Graphviz
        uses: eclipse-score/apt-install@main
        with:
          packages: graphviz
          cache: false

      - name: Run docs verification
        id: verify
        run: |
          bazel run ${{ inputs.bazel-docs-verify-target }}
