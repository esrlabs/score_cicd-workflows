name: Daily

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  maintenance:
    uses: ./.github/workflows/daily.yml
    permissions:
      contents: write
      issues: write
      pull-requests: write
      pages: write
      id-token: write
  renovate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout config file
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run renovate
        uses: renovatebot/github-action@79dc0ba74dc3de28db0a7aeb1d0b95d5bf5fde2a # v46.1.13
        with:
          token: ${{ secrets.SCORE_BOT_CLASSIC_PAT }}
          configurationFile: .github/renovate.json5
        env:
          LOG_LEVEL: debug
