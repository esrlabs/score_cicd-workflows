# Actually hourly, but such workflows are commonly named "daily" 
name: Daily

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  maintenance:
    uses: ./.github/workflows/daily.yml
    permissions:
      contents: write
      issues: write
      pull-requests: write
      pages: write
      id-token: write
  renovate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout config file
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Run renovate
        uses: renovatebot/github-action@3064367f740a1a91cca218698a63902689cce200 # v46.1.20
        with:
          token: ${{ secrets.SCORE_BOT_CLASSIC_PAT }}
          configurationFile: .github/renovate.json5
        env:
          LOG_LEVEL: debug
