# This is the main entry point for PR checks, for all S-CORE repositories.
#
# It runs as a SINGLE job whose steps are the individual checks. Each check step is
# gated with `if: ${{ !cancelled() && <capability> }}` so that:
#   - a check only runs when the repository actually has the relevant capability, and
#   - a failing check does NOT stop the checks after it (each still reports its own
#     pass/fail), while the job as a whole still fails if any step failed.
# `checkout` and the detection steps keep the default `success()` gate, so if they fail
# the capability outputs are empty and every check is skipped while the job is red.

# Attention: this workflow must be called with following permissions:
#    permissions:
#      contents: read

name: 🔁

on:
  workflow_call:
    inputs:
      skip-pre-commit:
        description: "Skip the pre-commit check even if .pre-commit-config.yaml exists"
        required: false
        default: false
        type: boolean
      skip-python-tests:
        description: "Skip the uv/pytest run even if pyproject.toml and uv.lock exist"
        required: false
        default: false
        type: boolean
      skip-format:
        description: "Skip bazel //:format.check even if the target exists"
        required: false
        default: false
        type: boolean
      skip-copyright:
        description: "Skip bazel //:copyright.check even if the target exists"
        required: false
        default: false
        type: boolean
      skip-bzlmod-lock:
        description: "Skip the Bazel bzlmod tidy/lockfile checks even if MODULE.bazel.lock exists"
        required: false
        default: false
        type: boolean

jobs:
  pr-checks:
    name: 🔁 Common PR checks
    runs-on: ${{ vars.runner_labels_ghub24_standard_x64 && fromJSON(vars.runner_labels_ghub24_standard_x64) || vars.REPO_RUNNER_LABELS && fromJSON(vars.REPO_RUNNER_LABELS) || 'ubuntu-24.04' }}

    permissions:
      contents: read

    steps:
      - name: 🚫 Refuse to run on pull_request_target
        if: github.event_name == 'pull_request_target'
        run: |
          echo "This workflow must not be called from pull_request_target."
          echo "That event has write access to repo secrets while checking out fork code,"
          echo "making it unsafe to run repository code on untrusted input."
          echo "Use pull_request or merge_group instead."
          exit 1

      - name: 📥 Check out
        uses: actions/checkout@v6

      - name: 🕵️ Detect repository capabilities
        id: detect
        run: |
          set -euo pipefail

          echo "Detected repository capabilities:"

          # Runs a boolean-style check function, writes it to GITHUB_OUTPUT and
          # echoes the result so the detection is visible in the step log.
          emit_output() {
            local name="$1"
            shift

            local value
            if "$@"; then
              value=true
            else
              value=false
            fi

            echo "$name=$value" >> "$GITHUB_OUTPUT"
            echo "  $name=$value"
          }

          # Returns success if any provided file path exists.
          any_file_exists() {
            local path
            for path in "$@"; do
              [[ -f "$path" ]] && return 0
            done
            return 1
          }

          # Returns success only if every provided file path exists.
          all_files_exist() {
            local path
            for path in "$@"; do
              [[ -f "$path" ]] || return 1
            done
            return 0
          }

          emit_output has_bazel any_file_exists \
            "MODULE.bazel" \
            "WORKSPACE" \
            "WORKSPACE.bazel"
          emit_output has_bazel_lock any_file_exists \
            "MODULE.bazel.lock"
          emit_output has_devcontainer any_file_exists \
            ".devcontainer/devcontainer.json" \
            "devcontainer.json"
          emit_output has_python_uv all_files_exist \
            "pyproject.toml" \
            "uv.lock"
          emit_output has_precommit any_file_exists \
            ".pre-commit-config.yaml"

      - name: ⚙️ Setup uv
        if: ${{ !cancelled() && (steps.detect.outputs.has_precommit == 'true' || steps.detect.outputs.has_python_uv == 'true') }}
        uses: astral-sh/setup-uv@v5

      - name: 🧹 Run pre-commit checks
        if: ${{ !cancelled() && steps.detect.outputs.has_precommit == 'true' && !inputs.skip-pre-commit }}
        run: |
          if ! uvx pre-commit run --all-files; then
            {
              echo '### ❌ pre-commit failed'
              echo ''
              echo 'One or more pre-commit hooks reported problems (formatting, linting, etc.).'
              echo ''
              echo '**Reproduce locally**'
              echo '```bash'
              echo 'uvx pre-commit run --all-files'
              echo '```'
              echo ''
              echo '**Fix**'
              echo 'Most hooks auto-fix. Re-run the command above, review the changes it made, then commit them.'
              echo 'Run `uvx pre-commit install` once to catch this before pushing.'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: 🐍 Run Python tests with uv
        if: ${{ !cancelled() && steps.detect.outputs.has_python_uv == 'true' && !inputs.skip-python-tests }}
        run: |
          if ! uv run --frozen python -m pytest; then
            {
              echo '### ❌ Python tests failed'
              echo ''
              echo 'Tests failed, or `uv.lock` is out of date (`--frozen` forbids updating it during the run).'
              echo ''
              echo '**Reproduce locally**'
              echo '```bash'
              echo 'uv run --frozen python -m pytest'
              echo '```'
              echo ''
              echo '**Fix**'
              echo 'Fix the failing tests. If the failure is about the lockfile, run `uv lock` and commit the updated `uv.lock`.'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: 📝 Check Bazel module name
        # The script to detect the module name is broken; kept disabled (&& false) until fixed.
        if: ${{ !cancelled() && steps.detect.outputs.has_bazel == 'true' && false }}
        run: |
          if ! MODULE_LINE=$(grep '^module(' MODULE.bazel | head -1); then
            echo "❌ No module declaration found in MODULE.bazel"
            exit 1
          fi

          MODULE_NAME=$(echo "$MODULE_LINE" | sed 's/^module([[:space:]]*name[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/' | sed 's/^module([[:space:]]*"\([^"]*\)".*/\1/')

          if [[ -z "$MODULE_NAME" || "$MODULE_NAME" == "$MODULE_LINE" ]]; then
            MODULE_NAME=$(echo "$MODULE_LINE" | grep -o '"[^"]*"' | head -1 | tr -d '"')
          fi

          echo "Found module name: $MODULE_NAME"

          if [[ ! "$MODULE_NAME" =~ ^score_[[:lower:]_]+$ ]]; then
            echo "❌ Invalid module name: $MODULE_NAME"
            echo "Module name must match the pattern: ^score_[[:lower:]_]+$"
            echo "  - Must start with 'score_'"
            echo "  - Must contain only lowercase letters and underscores after 'score_'"
            echo "Examples of valid names: score_cli, score_compose, score_web_api"
            exit 1
          fi

          echo "✅ Module name is valid: $MODULE_NAME"

      - name: ⚙️ Setup Bazel with shared caching
        if: ${{ !cancelled() && steps.detect.outputs.has_bazel == 'true' }}
        uses: eclipse-score/cicd-actions/setup-bazel-cache@07cd8ac969b01fbab47f1a0b91040bcd83008fa7
        with:
          unique-cache-name: ${{ github.job }}

      - name: 🕵️ Detect Bazel targets
        id: bazel
        if: ${{ !cancelled() && steps.detect.outputs.has_bazel == 'true' }}
        run: |
          set -euo pipefail

          echo "Detected Bazel targets:"

          # Runs a boolean-style check function, writes it to GITHUB_OUTPUT and
          # echoes the result so the detection is visible in the step log.
          emit_output() {
            local name="$1"
            shift

            local value
            if "$@"; then
              value=true
            else
              value=false
            fi

            echo "$name=$value" >> "$GITHUB_OUTPUT"
            echo "  $name=$value"
          }

          # Returns success if the given Bazel label can be queried from the repo root.
          has_bazel_target() {
            bazel query "$1" >/dev/null 2>&1
          }

          emit_output has_copyright_check has_bazel_target "//:copyright.check"
          emit_output has_format_check has_bazel_target "//:format.check"

      - name: 🖌️ Run bazel //:format.check
        if: ${{ !cancelled() && steps.bazel.outputs.has_format_check == 'true' && !inputs.skip-format }}
        run: |
          if ! bazel test //:format.check; then
            {
              echo '### ❌ Formatting check failed'
              echo ''
              echo '`//:format.check` found files that are not formatted according to the project formatting rules.'
              echo ''
              echo '**Reproduce locally**'
              echo '```bash'
              echo 'bazel test //:format.check'
              echo '```'
              echo ''
              echo '**Fix**'
              echo 'Auto-format the sources, then commit:'
              echo '```bash'
              echo 'bazel run //:format'
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: © Run bazel //:copyright.check
        if: ${{ !cancelled() && steps.bazel.outputs.has_copyright_check == 'true' && !inputs.skip-copyright }}
        run: |
          if ! bazel run //:copyright.check; then
            {
              echo '### ❌ Copyright check failed'
              echo ''
              echo 'One or more source files are missing the required copyright/license header.'
              echo ''
              echo '**Reproduce locally**'
              echo '```bash'
              echo 'bazel run //:copyright.check'
              echo '```'
              echo ''
              echo '**Fix**'
              echo 'Add the missing headers automatically, then commit:'
              echo '```bash'
              echo 'bazel run //:copyright.fix'
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: 🔒 Check Bazel module is tidy
        if: ${{ !cancelled() && steps.detect.outputs.has_bazel_lock == 'true' && !inputs.skip-bzlmod-lock }}
        run: |
          if ! { bazel mod tidy && git diff --exit-code; }; then
            {
              echo '### ❌ Bazel module is not tidy'
              echo ''
              echo '`bazel mod tidy` would change `MODULE.bazel` or `MODULE.bazel.lock`, so they are not tidy.'
              echo ''
              echo '**Reproduce locally**'
              echo '```bash'
              echo 'bazel mod tidy && git diff'
              echo '```'
              echo ''
              echo '**Fix**'
              echo 'Run `bazel mod tidy` and commit the resulting changes to `MODULE.bazel` / `MODULE.bazel.lock`.'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: 🔒 Check Bazel lockfile is up to date
        if: ${{ !cancelled() && steps.detect.outputs.has_bazel_lock == 'true' && !inputs.skip-bzlmod-lock }}
        run: |
          if [ ! -f "MODULE.bazel" ]; then
            echo "MODULE.bazel not found in $PWD"
            exit 1
          fi

          if [ ! -f "MODULE.bazel.lock" ]; then
            echo "MODULE.bazel.lock is missing. Run: bazel mod tidy"
            exit 1
          fi

          if ! bazel mod deps --lockfile_mode=error; then
            {
              echo '### ❌ Bazel lockfile is out of date'
              echo ''
              echo '`MODULE.bazel.lock` does not match the resolved dependency graph.'
              echo ''
              echo '**Reproduce locally**'
              echo '```bash'
              echo 'bazel mod deps --lockfile_mode=error'
              echo '```'
              echo ''
              echo '**Fix**'
              echo 'Regenerate the lockfile with `bazel mod tidy` and commit the updated `MODULE.bazel.lock`.'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
